# chess-to-music stack. Start everything with:  docker compose up --build -d
# (or just the database with:  docker compose up -d db)
services:
  app:
    build:
      context: .
    container_name: chess-music-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chess:chess@db:5432/chess?sslmode=disable
    ports:
      - "8080:8080"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: chess-music-db
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    ports:
      - "5432:5432"
    volumes:
      - chess_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chess -d chess" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chess_pgdata:
